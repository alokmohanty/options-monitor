gemini:
  # model: "gemini-2.5-pro"             # Requires billing
  # model: "gemini-2.0-flash"           # Requires billing
  # model: "gemini-2.5-flash"           # Free tier: 5 RPM, 20 RPD
  # model: "gemma-3-27b-it"            # Does NOT support function calling - unusable here
  # eod_model: "gemini-3-flash-preview" 
  # model: "gemini-3.1-flash-lite-preview" 
  model: "gemma-4-31b-it"        # Free tier: 15 RPM, 500 RPD
  temperature: 1.0                   # Generation temperature
  max_output_tokens: 8192            # Max tokens in response

discord:
  command_prefix: "!"                # Prefix for bot commands
  # bot_token is read from DISCORD_BOT_TOKEN env var
  # allowed_channel_ids: []          # Optionally restrict to specific channel IDs (leave empty to allow all)
  allowed_channel_ids:
    - 1487531508800422119 

trading_bot:
  root_path: "/home/ubuntu/options-bot"
  monitor_root_path: "/home/ubuntu/options-monitor"
  log_file: "/home/ubuntu/options-bot/logs/cron_output.log"
  max_log_lines: 2000                # Max lines to read from log file at once
  # File extensions to read when exploring bot code
  code_extensions:
    - ".py"
    - ".yaml"
    - ".yml"
    - ".json"
    - ".toml"
    - ".txt"
    - ".md"
    - ".log"
  # Directories to exclude when scanning bot code
  exclude_dirs:
    - "__pycache__"
    - ".git"
    - ".venv"
    - "venv"
    - "node_modules"
    - ".pytest_cache"

monitor:
  enabled: true
  timezone: "Asia/Kolkata"          # IST
  trading_start: "09:15"            # Start periodic checks (HH:MM IST)
  trading_end: "15:30"              # Stop periodic checks (HH:MM IST)
  check_interval_minutes: 3         # How often to check the log
  check_log_lines: 100              # Lines to read per periodic check
  eod_summary_time: "15:35"         # Time to post end-of-day summary (HH:MM IST)
  eod_log_lines: 2000               # Lines to read for EOD summary
  eod_model: "gemma-4-31b-it"          # Model for EOD journal (free tier: 5 RPM, 20 RPD)
  alert_on_ok: true                # If true, post even when everything looks normal
